<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>Estoque Digital — CRV/LAS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-scene">
  <div class="orb"></div><div class="orb"></div><div class="orb"></div>
</div>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="brand-icon">📦</div>
    <h2>Estoque Digital</h2>
    <p class="sub">CRV/LAS — Controle de Estoque</p>
    <select id="loginUser" class="login-field">
      <option value="">Selecione o seu nome</option>
      <option value="LUCAS">Lucas</option>
      <option value="TASSIO">Tassio</option>
      <option value="AMARAL">Amaral</option>
      <option value="ALEX">Alex</option>
      <option value="LUIZ">Luiz</option> <!-- -->
      <option value="GESTOR">Gestor (Alef)</option>
    </select>
    <div style="position:relative; margin-bottom:14px;">
      <input type="password" id="loginPass" class="login-field" placeholder="Sua senha" autocomplete="off">
    </div>
    <div class="lgpd-row">
      <input type="checkbox" id="lgpdCheck">
      <label for="lgpdCheck">Declaro que li e concordo com a recolha de dados conforme a <strong>LGPD</strong>.</label>
    </div>
    <button class="login-btn" id="loginBtn" onclick="fazerLogin()">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="ldScreen" class="hidden"><div class="ld-spinner"></div><div class="ld-text" id="ldText">Sincronizando...</div></div>

<!-- ══════════════ MAIN APP ══════════════ -->
<div id="mainApp" style="display:none;">
  <div class="top-bar">
    <div class="top-bar-row1">
      <div class="brand"><div class="brand-dot">📦</div><div class="brand-text"><h1>Estoque Digital</h1><span>CRV/LAS</span></div></div>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
    <div class="top-bar-row2">
      <span class="badge badge-online" id="badgeStatus">Online</span>
      <span class="user-badge" id="userBadge"></span>
    </div>
  </div>

  <div class="container">
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('painel')" id="tabPainel">Painel</button>
      <button class="tab-btn" onclick="switchTab('entrada')" id="tabEntrada">Entrada</button>
      <button class="tab-btn" onclick="switchTab('saida')" id="tabSaida">Saída</button>
      <button class="tab-btn" onclick="switchTab('auditoria')" id="tabAuditoria">Auditoria</button>
    </div>

    <!-- PAINEL -->
    <div class="tab-content active" id="contentPainel">
      <div class="stats-grid">
        <div class="stat-card blue"><div class="s-label">Total</div><div class="s-value" id="statTotal">0</div></div>
        <div class="stat-card red"><div class="s-label">Vencidos</div><div class="s-value" id="statVencidos">0</div></div>
      </div>
      <div class="relatorio-switch-row">
        <span>Relatório de Impressão</span>
        <div class="apple-switch" id="switchRelatorio" onclick="toggleRelatorio()"><div class="apple-switch-track"><div class="apple-switch-thumb"></div></div></div>
      </div>
      <div id="produtosList"></div>
    </div>

    <!-- ENTRADA -->
    <div class="tab-content" id="contentEntrada">
      <div class="ios-card">
        <div class="ios-card-row" style="flex-direction:column;">
          <div style="display:flex; justify-content:space-between; width:100%;">
            <span>Código de Barras</span>
            <button class="cam-btn primary" onclick="iniciarScannerEntrada()" style="width:auto; margin:0; padding:6px 12px;">📷 Bipar</button>
          </div>
          <input type="text" id="entCodigoBarras" class="form-field" style="margin-top:8px;">
        </div>
        <div id="scannerEntradaArea" style="display:none; padding:10px;"><div id="readerEntrada"></div></div>
        <div class="ios-card-row"><span>Setor</span><select id="entSetor" class="form-field"></select></div>
        <div class="ios-card-row"><span>Produto *</span><input type="text" id="entProduto" class="form-field"></div>
        <div class="ios-card-row"><span>Quantidade *</span><input type="number" id="entQtd" class="form-field"></div>
        <div class="ios-card-row"><span>Validade</span><input type="date" id="entValidade" class="form-field"></div>
        
        <!-- FOTO BLINDADA -->
        <div class="section-label">Identificação Visual</div>
        <div class="ios-card" style="padding:16px;">
          <button id="btnRevelarCamera" class="cam-btn" onclick="mostrarCameraEntrada()">📷 Adicionar Foto</button>
          <div id="areaCameraEntrada" style="display:none;">
            <div class="foto-preview-container"><video id="fotoVideo" autoplay playsinline></video><canvas id="fotoCanvas" style="display:none;"></canvas></div>
            <button class="submit-btn" id="btnFotoCapture" onclick="capturarFoto()" style="margin-top:10px;">📸 Capturar</button>
          </div>
        </div>
      </div>
      <button class="submit-btn" onclick="enviarEntrada()">Salvar Entrada</button>
    </div>

    <!-- SAÍDA -->
    <div class="tab-content" id="contentSaida">
      <div class="ios-card">
        <div class="ios-card-row" style="display:flex; gap:10px;">
          <input type="text" id="saidaSearch" class="form-field" placeholder="Buscar..." style="flex:1;">
          <button class="cam-btn primary" onclick="iniciarScannerSaida()" style="width:auto; margin:0;">📷 Bipar</button>
        </div>
      </div>
      <div id="carrinhoArea" style="display:none;" class="ios-card">
        <div id="cartList"></div>
        <div style="padding:16px;">
          <label>Motivo da Saída</label>
          <select id="loteMotivoSelect" class="form-field">
            <option value="PEDIDO">📦 Saída de Pedido</option>
            <option value="CONSUMO">🏢 Consumo Interno</option>
            <option value="AVARIA">⚠️ Avaria / Perda</option>
            <option value="VENCIDO">❌ Vencimento</option> <!--[cite: 5] -->
          </select>
          <button class="submit-btn" onclick="confirmarSaidaLote()" style="background:var(--orange)!important; margin-top:15px;">Confirmar Baixa</button>
        </div>
      </div>
      <div id="saidaList"></div>
    </div>
  </div>
</div>

<div id="relatorioOverlay" class="no-print"></div>
<div class="success-overlay" id="successOverlay"></div>
<script src="app.js"></script>
</body>
</html>
